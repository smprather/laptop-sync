# Mirror tool configuration

# Local source directory/directories to mirror.
# Can be a single string, a list, or include glob patterns.
#
# Single source (files go flat into dest):
#   source: "C:\\Projects\\myapp"
#
# Multiple sources (each gets a subdirectory under dest):
#   source:
#     - "C:\\Projects\\app1"
#     - "C:\\Projects\\app2"
#
# Glob pattern (each matched dir gets a subdirectory under dest):
#   source: "C:\\Projects\\app*"
source: "C:\\Projects\\myapp"

# Remote Linux host (user@hostname or just hostname)
host: "user@linuxbox"

# Remote destination directory
dest: "/home/user/mirror"

# Poll interval in seconds
interval: 5

# SSH port
ssh_port: 22

# Modification time tolerance in seconds (files with mtime differences
# within this threshold are considered unchanged)
mtime_tolerance: 2

# File/directory patterns to exclude from sync (fnmatch syntax)
# Patterns are matched against both filenames and relative paths
excludes:
  - ".git"
  - "__pycache__"
  - "*.pyc"
  - "node_modules"
  - ".env"
