# Mirror tool configuration

# Local Windows source directory to mirror
source: "C:\\Projects\\myapp"

# Remote Linux host (user@hostname or just hostname)
host: "user@linuxbox"

# Remote destination directory
dest: "/home/user/mirror"

# Poll interval in seconds
interval: 5

# SSH port
ssh_port: 22

# Modification time tolerance in seconds (files with mtime differences
# within this threshold are considered unchanged)
mtime_tolerance: 2

# File/directory patterns to exclude from sync (fnmatch syntax)
# Patterns are matched against both filenames and relative paths
excludes:
  - ".git"
  - "__pycache__"
  - "*.pyc"
  - "node_modules"
  - ".env"
